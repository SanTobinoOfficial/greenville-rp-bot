# Railway — główna konfiguracja projektu
# Każda usługa (bot, dashboard) ma własny railway.toml w swoim katalogu.
# Ten plik jest ignorowany przez Railway przy deploymencie z podkatalogu.
#
# Konfiguracja Railway (ustawić w Railway Dashboard UI):
#   Service 1 "greenville-dashboard": Root Directory = /dashboard
#   Service 2 "greenville-bot":       Root Directory = /bot
#
# Każdy z tych katalogów ma własny railway.toml z poprawną konfiguracją.
# Zmienne środowiskowe: patrz .env.example

[build]
builder = "NIXPACKS"
