# Railway — konfiguracja deploymentu bota Discord (Node.js)
# Plik musi być w katalogu bot/ gdy Railway używa go jako źródła

[build]
builder = "NIXPACKS"
buildCommand = "npm install && npx prisma generate"

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
